<VirtualHost *:80>
    DocumentRoot /usr/local/apache2/htdocs
    DirectoryIndex index.html

    AddOutputFilterByType DEFLATE text/plain text/css application/javascript application/json image/svg+xml font/woff2

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    <FilesMatch "\.(js|css|woff2?|ttf|eot|svg|png|jpg|webp|gif|ico)$">
        Header set Cache-Control "public, immutable, max-age=31536000"
    </FilesMatch>

    <Directory /usr/local/apache2/htdocs>
        Options -Indexes +FollowSymLinks
        AllowOverride FileInfo
        Require all granted

        RewriteEngine On

        # change to 301 when deployed to production
        RewriteRule ^midpoint/reference/master(/.*)?$ /midpoint/development/reference$1 [R=302,L]

        # change to 301 when deployed to production
        RewriteRule ^midpoint/reference/(support-[^/]+|before-4\.8)(/.*)?$ /midpoint/$1/reference$2 [R=302,L]

        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME}.html -f
        RewriteRule ^(.+)$ $1.html [L]
    </Directory>

    ErrorDocument 404 /404.html
</VirtualHost>
