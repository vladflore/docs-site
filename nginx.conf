server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|webp|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

#   change to 301 when deployed to production
    location ~ ^/midpoint/reference/master(/.*)?$ {
        return 302 $scheme://$http_host/midpoint/development/reference$1;
    }

    location ~ ^/midpoint/reference/(support-[^/]+|before-4\.8)(/.*)?$ {
        return 302 $scheme://$http_host/midpoint/$1/reference$2;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
